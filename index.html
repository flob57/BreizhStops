<!DOCTYPE html>

<html lang="fr">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Arrêts Bretagne</title>

  <link

    rel="stylesheet"

    href="https://unpkg.com/leaflet/dist/leaflet.css"

  />

  <link rel="stylesheet" href="style.css" />

</head>

<body>

  <header>

    <h1>🚍 Arrêts Bretagne</h1>

    <span id="status">Chargement...</span>

  </header>

  <main class="layout">

    <!-- Recherche et filtres -->

    <section class="search-tools">

      <input

        id="search"

        type="text"

        placeholder="Rechercher un arrêt, une commune, un réseau..."

        autocomplete="off"

      />

      <div class="filters">

        <select id="networkFilter">

          <option value="">Tous les réseaux</option>

        </select>

        <select id="cityFilter">

          <option value="">Toutes les communes</option>

        </select>

      </div>

    </section>

    <!-- Liste des résultats -->

    <section class="results-panel">

      <div id="counter"></div>

      <div id="results"></div>

    </section>

    <!-- Carte -->

    <section class="map-panel">

      <div id="map"></div>

    </section>

    <!-- Itinéraire -->

    <aside class="route-panel">

      <h2>Mon itinéraire</h2>

      <div id="routeList" class="empty">

        Aucun arrêt ajouté.

      </div>

      <button id="openRoute" disabled>

        Ouvrir dans Google Maps

      </button>

      <button id="clearRoute" class="secondary">

        Vider

      </button>

    </aside>

  </main>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script src="app.js"></script>

</body>

</html>
