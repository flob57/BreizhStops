<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arrêts Bretagne</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="search-panel">
      <h1>🚍 Arrêts Bretagne</h1>
      <p>Recherche d’arrêts urbains et interurbains</p>

      <input id="search" type="text" placeholder="Rechercher un arrêt, une commune, un réseau..." autocomplete="off" />

      <div class="filters">
        <select id="networkFilter">
          <option value="">Tous les réseaux</option>
        </select>

        <select id="cityFilter">
          <option value="">Toutes les communes</option>
        </select>
      </div>

      <div id="counter"></div>
      <div id="results"></div>
    </section>

    <aside class="route-panel">
      <h2>Mon itinéraire</h2>
      <div id="routeList" class="route-list empty">Aucun arrêt ajouté.</div>

      <button id="openRoute" disabled>Ouvrir dans Google Maps</button>
      <button id="clearRoute" class="secondary">Vider</button>
    </aside>
  </main>

  <script src="app.js"></script>
</body>
</html>
